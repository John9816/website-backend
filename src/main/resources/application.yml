server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/javascript,text/css,text/html,text/plain,text/event-stream
    min-response-size: 1024
  tomcat:
    threads:
      max: 400
      min-spare: 25
    accept-count: 200
    max-connections: 10000
    connection-timeout: 20000

spring:
  application:
    name: website

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/website?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1500000
      keepalive-time: 30000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 200
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 16

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLXRoaXMtdG8tYS1zdHJvbmctc2VjcmV0LWtleS1hdC1sZWFzdC0zMi1ieXRlcw==}
    expire-minutes: 720
    header: Authorization
    prefix: "Bearer "
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - https://*.vercel.app
      - https://api.751152.xyz
      - https://mt.751152.xyz
  admin:
    default-username: admin
    default-password: admin123

logging:
  level:
    root: INFO
    com.example.website: INFO
